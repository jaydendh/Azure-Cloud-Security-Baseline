<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 820" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#323130"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0078D4"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#107C10"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1180" height="820" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="40" y="46" font-size="24" font-weight="700" fill="#201F1E">Azure Cloud Security Baseline — Architecture</text>
  <text x="40" y="72" font-size="14" fill="#605E5C">Terraform IaC · GitHub Actions CI/CD (OIDC) · Private Key Vault · Policy-as-Code · Defender for Cloud</text>

  <!-- GitHub Actions / CI-CD -->
  <rect x="30" y="150" width="210" height="110" rx="10" fill="#24292F"/>
  <text x="135" y="182" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">GitHub Actions</text>
  <text x="135" y="205" font-size="12" fill="#C9D1D9" text-anchor="middle">CI on PR: fmt · validate</text>
  <text x="135" y="222" font-size="12" fill="#C9D1D9" text-anchor="middle">Checkov · plan</text>
  <text x="135" y="244" font-size="12" fill="#C9D1D9" text-anchor="middle">CD on main: apply</text>

  <!-- OIDC arrow -->
  <line x1="240" y1="205" x2="315" y2="205" stroke="#0078D4" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="277" y="196" font-size="11" fill="#0078D4" text-anchor="middle" font-weight="600">OIDC</text>
  <text x="277" y="224" font-size="10" fill="#605E5C" text-anchor="middle">no stored secrets</text>

  <!-- Azure subscription boundary -->
  <rect x="315" y="110" width="835" height="680" rx="12" fill="#F3F9FD" stroke="#0078D4" stroke-width="2"/>
  <text x="335" y="135" font-size="14" font-weight="700" fill="#0078D4">Azure Subscription — Cloud-Subscription</text>

  <!-- Subscription-scope band: Policy + Defender -->
  <rect x="335" y="150" width="360" height="66" rx="8" fill="#EAF3FB" stroke="#0078D4" stroke-width="1.3"/>
  <text x="515" y="176" font-size="13" font-weight="700" fill="#0B4C86" text-anchor="middle">Azure Policy</text>
  <text x="515" y="197" font-size="11.5" fill="#323130" text-anchor="middle">CIS Azure Foundations Benchmark</text>
  <text x="515" y="211" font-size="10.5" fill="#605E5C" text-anchor="middle">assigned at subscription scope</text>

  <rect x="715" y="150" width="415" height="66" rx="8" fill="#EAF3FB" stroke="#0078D4" stroke-width="1.3"/>
  <text x="922" y="176" font-size="13" font-weight="700" fill="#0B4C86" text-anchor="middle">Microsoft Defender for Cloud</text>
  <text x="922" y="197" font-size="11.5" fill="#323130" text-anchor="middle">Foundational CSPM (free) + Defender for Key Vault</text>
  <text x="922" y="211" font-size="10.5" fill="#605E5C" text-anchor="middle">secure score · recommendations</text>

  <!-- Resource Group -->
  <rect x="335" y="235" width="795" height="500" rx="10" fill="#FFFFFF" stroke="#8A8886" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="352" y="259" font-size="13" font-weight="700" fill="#323130">Resource Group — rg-cloudsec-jayden · Central US</text>

  <!-- VNet -->
  <rect x="360" y="280" width="440" height="430" rx="10" fill="#EAF3FB" stroke="#0078D4" stroke-width="1.6"/>
  <text x="378" y="303" font-size="12.5" font-weight="700" fill="#0B4C86">VNet — vnet-cloudsec-jayden (10.40.0.0/16)</text>

  <!-- Subnet -->
  <rect x="385" y="320" width="390" height="150" rx="8" fill="#DCE9F5" stroke="#40587C" stroke-width="1.3"/>
  <text x="403" y="342" font-size="12" font-weight="600" fill="#2B3F5C">Subnet — main-subnet (10.40.1.0/24)</text>

  <!-- Private Endpoint -->
  <rect x="415" y="360" width="330" height="90" rx="8" fill="#C7E0F4" stroke="#005A9E" stroke-width="1.4"/>
  <text x="580" y="388" font-size="13" font-weight="700" fill="#004578" text-anchor="middle">Private Endpoint</text>
  <text x="580" y="408" font-size="11.5" fill="#323130" text-anchor="middle">kv-private-endpoint + NIC</text>
  <text x="580" y="426" font-size="11" fill="#605E5C" text-anchor="middle">private IP 10.40.1.x</text>

  <!-- Private DNS Zone -->
  <rect x="385" y="600" width="390" height="80" rx="8" fill="#EFE4F7" stroke="#5C2D91" stroke-width="1.4"/>
  <text x="580" y="628" font-size="12.5" font-weight="700" fill="#4B2673" text-anchor="middle">Private DNS Zone</text>
  <text x="580" y="647" font-size="11" fill="#323130" text-anchor="middle">privatelink.vaultcore.azure.net</text>
  <text x="580" y="664" font-size="10.5" fill="#605E5C" text-anchor="middle">VNet link → resolves vault to private IP</text>

  <!-- DNS zone linked to VNet (dashed) -->
  <line x1="580" y1="600" x2="580" y2="470" stroke="#5C2D91" stroke-width="1.6" stroke-dasharray="5 4"/>
  <text x="592" y="540" font-size="10.5" fill="#5C2D91">VNet link</text>

  <!-- Key Vault -->
  <rect x="850" y="360" width="255" height="120" rx="10" fill="#FFF4CE" stroke="#C19C00" stroke-width="1.6"/>
  <text x="977" y="390" font-size="14" font-weight="700" fill="#6B5900" text-anchor="middle">Key Vault</text>
  <text x="977" y="410" font-size="12" fill="#323130" text-anchor="middle">kv-lab-jayden2</text>
  <rect x="872" y="424" width="210" height="26" rx="6" fill="#FDE7E9" stroke="#D13438" stroke-width="1.2"/>
  <text x="977" y="442" font-size="11.5" font-weight="700" fill="#A4262C" text-anchor="middle">Public access: DISABLED</text>

  <!-- PE -> Key Vault (private link) -->
  <line x1="745" y1="405" x2="850" y2="410" stroke="#107C10" stroke-width="2.4" marker-end="url(#arrowGreen)"/>
  <text x="797" y="386" font-size="10.5" fill="#107C10" text-anchor="middle" font-weight="600">approved</text>
  <text x="797" y="399" font-size="10.5" fill="#107C10" text-anchor="middle" font-weight="600">private link</text>

  <!-- Secret seeded note -->
  <text x="977" y="500" font-size="10.5" fill="#605E5C" text-anchor="middle">secret seeded over private endpoint</text>
  <text x="977" y="514" font-size="10.5" fill="#605E5C" text-anchor="middle">(not in Terraform state)</text>

  <!-- Log Analytics -->
  <rect x="850" y="560" width="255" height="120" rx="10" fill="#E8F5E9" stroke="#107C10" stroke-width="1.6"/>
  <text x="977" y="592" font-size="13.5" font-weight="700" fill="#0B5A0B" text-anchor="middle">Log Analytics</text>
  <text x="977" y="612" font-size="11.5" fill="#323130" text-anchor="middle">law-cloudsec-jayden</text>
  <text x="977" y="632" font-size="11" fill="#605E5C" text-anchor="middle">AuditEvent logs</text>
  <text x="977" y="650" font-size="11" fill="#605E5C" text-anchor="middle">KQL audit queries</text>

  <!-- Key Vault -> Log Analytics (diagnostic logs) -->
  <line x1="977" y1="480" x2="977" y2="560" stroke="#107C10" stroke-width="2.4" marker-end="url(#arrowGreen)"/>
  <text x="990" y="524" font-size="10.5" fill="#107C10" font-weight="600">diagnostic logs</text>

  <!-- Defender monitors Key Vault (dashed) -->
  <line x1="960" y1="216" x2="960" y2="360" stroke="#0078D4" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrowBlue)"/>
  <text x="972" y="300" font-size="10.5" fill="#0078D4">monitors ·</text>
  <text x="972" y="314" font-size="10.5" fill="#0078D4">recommends</text>

  <!-- GitHub -> RG deploys (dashed long) -->
  <path d="M135,260 L135,755 L332,755" fill="none" stroke="#605E5C" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="150" y="778" font-size="10.5" fill="#605E5C">terraform apply provisions VNet · Subnet · Private Endpoint · Private DNS · Key Vault</text>

  <!-- Legend -->
  <rect x="335" y="748" width="360" height="34" rx="6" fill="#FAF9F8" stroke="#D2D0CE" stroke-width="1"/>
  <line x1="348" y1="765" x2="378" y2="765" stroke="#107C10" stroke-width="2.4"/>
  <text x="384" y="769" font-size="10.5" fill="#323130">data/network path</text>
  <line x1="500" y1="765" x2="530" y2="765" stroke="#0078D4" stroke-width="1.6" stroke-dasharray="5 4"/>
  <text x="536" y="769" font-size="10.5" fill="#323130">management / monitoring</text>
</svg>
